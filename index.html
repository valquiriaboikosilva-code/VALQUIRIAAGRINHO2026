<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultivo Equilibrado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌱 Cultivo Equilibrado</h1>
    <p>Agro forte, futuro sustentável</p>
</header>

<main>
    <div id="game-container">

        <div id="status-panel">
            <div>📅 Dia: <span id="dia">1</span></div>
            <div>💰 Ouro: $<span id="ouro">50</span></div>
            <div>💧 Água: <span id="agua">100</span>%</div>
            <div>🌱 Solo: <span id="solo">100</span>%</div>
        </div>

        <div id="fazenda">
            <div class="plot" id="plot"></div>
        </div>

        <div id="action-panel">
            <button id="btn-plantar">🌿 Plantar</button>
            <button id="btn-regar">💧 Regar</button>
            <button id="btn-colher">🍅 Colher</button>
            <button id="btn-vender">💰 Vender</button>
            <button id="btn-regenerar">♻️ Regenerar Solo</button>
        </div>

        <div id="msg-container">
            <p id="mensagem">Bem-vindo à fazenda sustentável!</p>
        </div>

    </div>
</main>

<footer>
    Concurso Agrinho 2026
</footer>

<script src="script.js"></script>
</body>
</html>
