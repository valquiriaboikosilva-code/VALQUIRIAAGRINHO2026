<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌱 Valquíria Farm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .plot {
      width: 280px;
      height: 280px;
      background: linear-gradient(#5C4033, #8B5A2B);
      border: 8px solid #4A3F35;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .plant {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 120px;
      transition: all 0.8s ease;
      filter: drop-shadow(0 10px 10px rgba(0,0,0,0.4));
    }
    .water-level {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(transparent, rgba(59, 130, 246, 0.7));
      transition: height 0.6s ease;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-green-900 to-emerald-950 text-white min-h-screen">

<div class="max-w-4xl mx-auto p-6">
  <h1 class="text-5xl font-bold text-center mb-8 text-yellow-300">🌾 VALQUÍRIA FARM 🌾</h1>

  <!-- STATS -->
  <div class="grid grid-cols-5 gap-4 mb-8 text-center">
    <div class="bg-black/40 rounded-xl p-4">
      <p class="text-sm text-gray-400">Dia</p>
      <p id="day" class="text-4xl font-bold text-amber-300">1</p>
    </div>
    <div class="bg-black/40 rounded-xl p-4">
      <p class="text-sm text-gray-400">💰 Dinheiro</p>
      <p id="money" class="text-4xl font-bold text-green-400">$ 0</p>
    </div>
    <div class="bg-black/40 rounded-xl p-4">
      <p class="text-sm text-gray-400">💧 Água</p>
      <p id="water" class="text-4xl font-bold text-blue-400">85%</p>
    </div>
    <div class="bg-black/40 rounded-xl p-4">
      <p class="text-sm text-gray-400">🌱 Solo</p>
      <p id="soil" class="text-4xl font-bold text-amber-600">88%</p>
    </div>
    <div class="bg-black/40 rounded-xl p-4">
      <p class="text-sm text-gray-400">Total Ganhos</p>
      <p id="totalEarned" class="text-4xl font-bold text-yellow-400">$ 0</p>
    </div>
  </div>

  <!-- PLOT -->
  <div class="flex justify-center mb-8">
    <div class="plot" id="plot">
      <div id="waterOverlay" class="water-level h-0"></div>
      <div id="plant" class="plant">🌱</div>
    </div>
  </div>

  <!-- CONTROLES -->
  <div class="grid grid-cols-3 md:grid-cols-7 gap-3 mb-8">
    <button onclick="plantSeed()" class="bg-emerald-600 hover:bg-emerald-700 py-4 rounded-xl font-bold flex items-center justify-center gap-2">
      <i class="fas fa-seedling"></i> PLANTAR
    </button>
    <button onclick="waterPlant()" class="bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold flex items-center justify-center gap-2">
      <i class="fas fa-tint"></i> REGAR
    </button>
    <button onclick="collectRiverWater()" class="bg-cyan-600 hover:bg-cyan-700 py-4 rounded-xl font-bold flex items-center justify-center gap-2">
      <i class="fas fa-water"></i> PEGAR ÁGUA DO RIO
    </button>
    <button onclick="harvest()" class="bg-amber-600 hover:bg-amber-700 py-4 rounded-xl font-bold flex items-center justify-center gap-2">
      <i class="fas fa-hand-holding"></i> COLHER
    </button>
    <button onclick="sellHarvest()" class="bg-green-600 hover:bg-green-700 py-4 rounded-xl font-bold flex items-center justify-center gap-2">
      <i class="fas fa-dollar-sign"></i> VENDER
    </button>
    <button onclick="regenerateSoil()" class="bg-amber-700 hover:bg-amber-800 py-4 rounded-xl font-bold flex items-center justify-center gap-2">
      <i class="fas fa-sync"></i> REGENERAR SOLO
    </button>
    <button onclick="openShop()" class="bg-purple-600 hover:bg-purple-700 py-4 rounded-xl font-bold flex items-center justify-center gap-2">
      <i class="fas fa-store"></i> LOJA
    </button>
  </div>

  <div class="text-center">
    <button onclick="nextDay()" class="bg-gray-800 hover:bg-gray-700 px-10 py-3 rounded-2xl text-xl font-bold">
      ⏭️ Avançar Dia
    </button>
  </div>
</div>

<!-- SHOP MODAL -->
<div id="shopModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
  <div class="bg-gray-900 rounded-3xl p-8 max-w-lg w-full mx-4">
    <h2 class="text-3xl font-bold text-center mb-6">🛒 Loja de Sementes</h2>
    <div id="shopItems" class="grid grid-cols-2 gap-4"></div>
    <button onclick="closeShop()" class="mt-6 w-full bg-red-600 py-3 rounded-2xl font-bold">FECHAR</button>
  </div>
</div>

<script>
// ==================== VARIÁVEIS ====================
let day = 1;
let money = 0;
let totalEarned = 0;
let water = 85;
let soil = 88;

let currentPlant = null;

const seeds = [
  { id: 1, name: "Cenoura", emoji: "🥕", price: 30, value: 85, maxStage: 4 },
  { id: 2, name: "Tomate", emoji: "🍅", price: 45, value: 130, maxStage: 5 },
  { id: 3, name: "Morango", emoji: "🍓", price: 60, value: 180, maxStage: 4 },
  { id: 4, name: "Girassol", emoji: "🌻", price: 80, value: 250, maxStage: 6 }
];

// ==================== INICIALIZAÇÃO ====================
function startGame() {
  currentPlant = {
    name: "Cenoura",
    emoji: "🌱",
    stage: 1,
    maxStage: 4,
    value: 85,
    waterNeed: 25
  };
  updateUI();
}

function updateUI() {
  document.getElementById('day').textContent = day;
  document.getElementById('money').textContent = `$ ${money}`;
  document.getElementById('water').textContent = `${Math.floor(water)}%`;
  document.getElementById('soil').textContent = `${Math.floor(soil)}%`;
  document.getElementById('totalEarned').textContent = `$ ${totalEarned}`;
  
  const plantEl = document.getElementById('plant');
  const waterOverlay = document.getElementById('waterOverlay');
  
  if (currentPlant) {
    const growth = Math.floor((currentPlant.stage / currentPlant.maxStage) * 100);
    plantEl.style.fontSize = `${70 + growth * 1.3}px`;
    plantEl.textContent = currentPlant.emoji;
    waterOverlay.style.height = `${water * 1.8}px`;
  } else {
    plantEl.textContent = '';
    waterOverlay.style.height = '0';
  }
}

// ==================== AÇÕES ====================
function plantSeed() {
  if (currentPlant) {
    alert("Já tem uma planta crescendo!");
    return;
  }
  openShop();
}

function waterPlant() {
  if (!currentPlant) {
    alert("Não há planta para regar!");
    return;
  }
  if (water < 15) {
    alert("Água insuficiente!");
    return;
  }
  water = Math.max(0, water - 15);
  currentPlant.stage = Math.min(currentPlant.maxStage, currentPlant.stage + 1);
  updateUI();
}

function collectRiverWater() {
  const amount = 45;
  water = Math.min(100, water + amount);
  alert(`💧 Você pegou água do rio! +${amount}% de água`);
  updateUI();
}

function harvest() {
  if (!currentPlant || currentPlant.stage < currentPlant.maxStage) {
    alert("A planta ainda não está madura para colher!");
    return;
  }
  alert(`🌾 Você colheu ${currentPlant.name}!`);
  currentPlant = null;
  updateUI();
}

function sellHarvest() {
  if (currentPlant) {
    alert("Colha primeiro antes de vender!");
    return;
  }
  const sellValue = Math.floor(Math.random() * 40) + 70;
  money += sellValue;
  totalEarned += sellValue;
  alert(`💰 Vendido por $${sellValue}!`);
  updateUI();
}

function regenerateSoil() {
  if (money < 25) {
    alert("Você precisa de $25 para regenerar o solo.");
    return;
  }
  money -= 25;
  soil = 100;
  alert("🌱 Solo regenerado!");
  updateUI();
}

function nextDay() {
  day++;
  
  if (currentPlant) {
    water = Math.max(0, water - 18);
    soil = Math.max(25, soil - 9);
    if (water > 25) {
      currentPlant.stage = Math.min(currentPlant.maxStage, currentPlant.stage + 1);
    }
  } else {
    water = Math.min(100, water + 15);
    soil = Math.max(25, soil - 3);
  }
  
  updateUI();
}

// ==================== LOJA ====================
function openShop() {
  const container = document.getElementById('shopItems');
  container.innerHTML = '';
  
  seeds.forEach(seed => {
    const div = document.createElement('div');
    div.className = "bg-gray-800 rounded-2xl p-4 text-center hover:scale-105 transition cursor-pointer";
    div.innerHTML = `
      <div class="text-6xl mb-3">${seed.emoji}</div>
      <h3 class="font-bold">${seed.name}</h3>
      <p class="text-green-400">$${seed.price}</p>
      <button onclick="buySeed(${seed.id}); event.stopImmediatePropagation()" 
              class="mt-4 w-full bg-emerald-600 hover:bg-emerald-700 py-2 rounded-xl text-sm font-bold">
        COMPRAR E PLANTAR
      </button>
    `;
    container.appendChild(div);
  });
  
  document.getElementById('shopModal').classList.remove('hidden');
}

function buySeed(id) {
  const seed = seeds.find(s => s.id === id);
  if (money < seed.price) {
    alert("Dinheiro insuficiente!");
    return;
  }
  
  money -= seed.price;
  currentPlant = {
    name: seed.name,
    emoji: seed.emoji,
    stage: 1,
    maxStage: seed.maxStage,
    value: seed.value,
    waterNeed: 25
  };
  
  closeShop();
  updateUI();
  alert(`🌱 ${seed.name} plantada!`);
}

function closeShop() {
  document.getElementById('shopModal').classList.add('hidden');
}

// Iniciar jogo
startGame();
</script>

</body>
</html>
