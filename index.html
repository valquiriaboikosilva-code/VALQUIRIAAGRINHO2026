<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 Valquíria Farm 🌸</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #a5d6ff, #c3e6b8, #f0e6b8);
      background-image: url('https://images.unsplash.com/photo-1587502536900-baf0c3d6a0e0?q=80&w=1920');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      color: #333;
    }
    .plot {
      width: 320px;
      height: 320px;
      background: linear-gradient(#8d6b4a, #c4a07c);
      border: 14px solid #5c4033;
      border-radius: 30px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .plant {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 140px;
      transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
    }
    .water-level {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(transparent, #60a5fa88);
      transition: height 1s ease;
    }
    button {
      transition: all 0.3s ease;
    }
    button:hover {
      transform: scale(1.08) translateY(-3px);
    }
    .cute-title {
      text-shadow: 3px 3px 0px #fff, -2px -2px 0px #fff;
    }
  </style>
</head>
<body class="min-h-screen">

<div class="max-w-5xl mx-auto p-6">
  <h1 class="text-6xl font-bold text-center mb-8 text-pink-600 cute-title">
    🌸 VALQUÍRIA FARM 🌸
  </h1>

  <!-- STATS -->
  <div class="grid grid-cols-5 gap-4 mb-10 text-center bg-white/70 backdrop-blur-md rounded-3xl p-6 shadow-xl">
    <div>
      <p class="text-sm text-rose-600">Dia</p>
      <p id="day" class="text-4xl font-bold text-amber-600">1</p>
    </div>
    <div>
      <p class="text-sm text-rose-600">💰 Dinheiro</p>
      <p id="money" class="text-4xl font-bold text-emerald-600">$ 0</p>
    </div>
    <div>
      <p class="text-sm text-rose-600">💧 Água</p>
      <p id="water" class="text-4xl font-bold text-blue-500">85%</p>
    </div>
    <div>
      <p class="text-sm text-rose-600">🌱 Solo</p>
      <p id="soil" class="text-4xl font-bold text-amber-700">88%</p>
    </div>
    <div>
      <p class="text-sm text-rose-600">Total</p>
      <p id="totalEarned" class="text-4xl font-bold text-pink-600">$ 0</p>
    </div>
  </div>

  <!-- CANTEIRO FOFINHO -->
  <div class="flex justify-center mb-10">
    <div class="plot">
      <div id="waterOverlay" class="water-level h-0"></div>
      <div id="plant" class="plant">🌱</div>
    </div>
  </div>

  <!-- BOTÕES FOFINHOS -->
  <div class="grid grid-cols-3 md:grid-cols-7 gap-4 mb-10">
    <button onclick="plantSeed()" class="bg-pink-500 hover:bg-pink-400 text-white py-6 rounded-3xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">
      🌱 PLANTAR
    </button>
    <button onclick="waterPlant()" class="bg-blue-500 hover:bg-blue-400 text-white py-6 rounded-3xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">
      💧 REGAR
    </button>
    <button onclick="collectRiverWater()" class="bg-cyan-500 hover:bg-cyan-400 text-white py-6 rounded-3xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">
      🪣 ÁGUA DO RIO
    </button>
    <button onclick="harvest()" class="bg-amber-500 hover:bg-amber-400 text-white py-6 rounded-3xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">
      🌾 COLHER
    </button>
    <button onclick="sellHarvest()" class="bg-emerald-500 hover:bg-emerald-400 text-white py-6 rounded-3xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">
      💰 VENDER
    </button>
    <button onclick="regenerateSoil()" class="bg-orange-500 hover:bg-orange-400 text-white py-6 rounded-3xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">
      🌍 REGENERAR SOLO
    </button>
    <button onclick="openShop()" class="bg-purple-500 hover:bg-purple-400 text-white py-6 rounded-3xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">
      🛒 LOJA
    </button>
  </div>

  <div class="text-center">
    <button onclick="nextDay()" class="bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white px-16 py-5 rounded-3xl text-2xl font-bold shadow-2xl">
      ⏭️ Avançar para o próximo dia ✨
    </button>
  </div>
</div>

<!-- LOJA FOFINHA -->
<div id="shopModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-white rounded-3xl p-8 max-w-lg w-full mx-4 shadow-2xl">
    <h2 class="text-4xl font-bold text-center mb-2 text-pink-600">🛒 Loja do Dia <span id="currentDay" class="text-2xl"></span></h2>
    <p class="text-center text-gray-500 mb-6">Escolha suas sementinhas fofas!</p>
    <div id="shopItems" class="grid grid-cols-1 gap-4"></div>
    <button onclick="closeShop()" class="mt-6 w-full bg-rose-500 hover:bg-rose-600 text-white py-4 rounded-3xl font-bold text-xl">Fechar Loja</button>
  </div>
</div>

<script>
// ==================== VARIÁVEIS ====================
let day = 1;
let money = 0;
let totalEarned = 0;
let water = 85;
let soil = 88;
let currentPlant = null;

const allSeeds = [
  { id: 1, name: "Cenourinha", emoji: "🥕", price: 25, value: 90, maxStage: 4 },
  { id: 2, name: "Tomatinho", emoji: "🍅", price: 40, value: 140, maxStage: 5 },
  { id: 3, name: "Moranguinho", emoji: "🍓", price: 55, value: 195, maxStage: 4 },
  { id: 4, name: "Girassolzinho", emoji: "🌻", price: 70, value: 270, maxStage: 6 },
  { id: 5, name: "Batatinha", emoji: "🥔", price: 35, value: 120, maxStage: 5 },
  { id: 6, name: "Milhozinho", emoji: "🌽", price: 50, value: 165, maxStage: 5 }
];

let availableSeeds = [];

// ==================== INICIALIZAÇÃO ====================
function startGame() {
  refreshShopStock();
  currentPlant = { name: "Cenourinha", emoji: "🌱", stage: 1, maxStage: 4, value: 90 };
  updateUI();
}

function refreshShopStock() {
  availableSeeds = [...allSeeds].sort(() => Math.random() - 0.5).slice(0, 3);
}

function updateUI() {
  document.getElementById('day').textContent = day;
  document.getElementById('money').textContent = `$ ${money}`;
  document.getElementById('water').textContent = `${Math.floor(water)}%`;
  document.getElementById('soil').textContent = `${Math.floor(soil)}%`;
  document.getElementById('totalEarned').textContent = `$ ${totalEarned}`;

  const plantEl = document.getElementById('plant');
  const waterOverlay = document.getElementById('waterOverlay');

  if (currentPlant) {
    const growth = (currentPlant.stage / currentPlant.maxStage) * 100;
    plantEl.style.fontSize = `${85 + growth * 1.5}px`;
    plantEl.textContent = currentPlant.emoji;
    waterOverlay.style.height = `${water * 2.2}px`;
  } else {
    plantEl.textContent = '🪴';
    waterOverlay.style.height = '0';
  }
}

// ==================== AÇÕES ====================
function plantSeed() {
  if (currentPlant) return alert("🌱 Já tem uma plantinha crescendo!");
  openShop();
}

function waterPlant() {
  if (!currentPlant) return alert("Plante algo primeiro 💕");
  if (water < 15) return alert("💧 Não tem água suficiente!");
  water -= 15;
  currentPlant.stage = Math.min(currentPlant.maxStage, currentPlant.stage + 1);
  updateUI();
}

function collectRiverWater() {
  water = Math.min(100, water + 50);
  alert("🪣 Você pegou água fresquinha do rio! +50% 💧");
  updateUI();
}

function harvest() {
  if (!currentPlant || currentPlant.stage < currentPlant.maxStage) {
    return alert("🌱 Ainda não está madurinha...");
  }
  alert(`🎉 Você colheu ${currentPlant.name}! Que linda!`);
  currentPlant = null;
  updateUI();
}

function sellHarvest() {
  if (currentPlant) return alert("Colha primeiro!");
  const sellValue = Math.floor(Math.random() * 50) + 80;
  money += sellValue;
  totalEarned += sellValue;
  alert(`💰 Vendido por $${sellValue}! Parabéns! ✨`);
  updateUI();
}

function regenerateSoil() {
  if (money < 30) return alert("💰 Precisa de $30 para cuidar do solo!");
  money -= 30;
  soil = 100;
  alert("🌍 O solo está feliz e saudável novamente! 💕");
  updateUI();
}

function nextDay() {
  day++;
  refreshShopStock();

  if (currentPlant) {
    water = Math.max(10, water - 22);
    soil = Math.max(20, soil - 11);
    if (water > 35) currentPlant.stage = Math.min(currentPlant.maxStage, currentPlant.stage + 1);
  } else {
    water = Math.min(100, water + 20);
    soil = Math.max(20, soil - 5);
  }

  updateUI();
}

// ==================== LOJA ====================
function openShop() {
  document.getElementById('currentDay').textContent = `— Dia ${day}`;
  const container = document.getElementById('shopItems');
  container.innerHTML = '';

  availableSeeds.forEach(seed => {
    const div = document.createElement('div');
    div.className = "bg-gradient-to-br from-pink-100 to-amber-100 border-2 border-pink-300 rounded-3xl p-6 text-center hover:border-pink-500 transition cursor-pointer";
    div.innerHTML = `
      <div class="text-7xl mb-4">${seed.emoji}</div>
      <h3 class="font-bold text-2xl text-pink-700">${seed.name}</h3>
      <p class="text-emerald-600 text-2xl font-bold">$${seed.price}</p>
      <button onclick="buySeed(${seed.id}); event.stopImmediatePropagation()" 
              class="mt-5 w-full bg-pink-500 hover:bg-pink-600 text-white py-4 rounded-3xl font-bold">
        Comprar e Plantar
      </button>
    `;
    container.appendChild(div);
  });

  document.getElementById('shopModal').classList.remove('hidden');
}

function buySeed(id) {
  const seed = availableSeeds.find(s => s.id === id);
  if (money < seed.price) return alert("💸 Dinheiro insuficiente...");

  money -= seed.price;
  currentPlant = {
    name: seed.name,
    emoji: seed.emoji,
    stage: 1,
    maxStage: seed.maxStage,
    value: seed.value
  };

  closeShop();
  updateUI();
  alert(`🌱 ${seed.name} plantadinha com carinho! 💕`);
}

function closeShop() {
  document.getElementById('shopModal').classList.add('hidden');
}

// Iniciar o jogo fofinho
startGame();
</script>
</body>
</html>
