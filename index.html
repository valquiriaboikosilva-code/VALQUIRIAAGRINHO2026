<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌾 Valquíria Farm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #0f172a, #1e3a2f, #2e5c2b);
      background-image: url('https://images.unsplash.com/photo-1500382017468-88cb43b2d2a3?q=80&w=1920');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      color: white;
    }
    .plot {
      width: 300px;
      height: 300px;
      background: linear-gradient(#5C4033, #8B5A2B);
      border: 12px solid #3f2a1e;
      border-radius: 25px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }
    .plant {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 130px;
      transition: all 1s ease;
      filter: drop-shadow(0 15px 15px rgba(0,0,0,0.5));
    }
    .water-level {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(transparent, rgba(59, 130, 246, 0.65));
      transition: height 0.8s ease;
    }
    .shop-item {
      transition: all 0.3s ease;
    }
    .shop-item:hover {
      transform: scale(1.08) rotate(2deg);
    }
  </style>
</head>
<body>

<div class="max-w-5xl mx-auto p-6">
  <h1 class="text-5xl font-bold text-center mb-6 text-yellow-300 drop-shadow-lg">
    🌾 VALQUÍRIA FARM 🌾
  </h1>

  <!-- STATS -->
  <div class="grid grid-cols-5 gap-4 mb-8 text-center bg-black/50 backdrop-blur-md rounded-3xl p-5">
    <div>
      <p class="text-sm text-gray-300">Dia</p>
      <p id="day" class="text-4xl font-bold text-amber-300">1</p>
    </div>
    <div>
      <p class="text-sm text-gray-300">💰 Dinheiro</p>
      <p id="money" class="text-4xl font-bold text-green-400">$ 0</p>
    </div>
    <div>
      <p class="text-sm text-gray-300">💧 Água</p>
      <p id="water" class="text-4xl font-bold text-blue-400">85%</p>
    </div>
    <div>
      <p class="text-sm text-gray-300">🌱 Solo</p>
      <p id="soil" class="text-4xl font-bold text-amber-600">88%</p>
    </div>
    <div>
      <p class="text-sm text-gray-300">Total Ganhos</p>
      <p id="totalEarned" class="text-4xl font-bold text-yellow-400">$ 0</p>
    </div>
  </div>

  <!-- PLOT -->
  <div class="flex justify-center mb-8">
    <div class="plot" id="plot">
      <div id="waterOverlay" class="water-level h-0"></div>
      <div id="plant" class="plant">🌱</div>
    </div>
  </div>

  <!-- CONTROLES -->
  <div class="grid grid-cols-3 md:grid-cols-7 gap-3 mb-8">
    <button onclick="plantSeed()" class="bg-emerald-700 hover:bg-emerald-600 py-5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg">
      <i class="fas fa-seedling"></i> PLANTAR
    </button>
    <button onclick="waterPlant()" class="bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg">
      <i class="fas fa-tint"></i> REGAR
    </button>
    <button onclick="collectRiverWater()" class="bg-cyan-600 hover:bg-cyan-500 py-5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg">
      <i class="fas fa-water"></i> ÁGUA DO RIO
    </button>
    <button onclick="harvest()" class="bg-amber-600 hover:bg-amber-500 py-5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg">
      <i class="fas fa-hand-holding"></i> COLHER
    </button>
    <button onclick="sellHarvest()" class="bg-green-600 hover:bg-green-500 py-5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg">
      <i class="fas fa-dollar-sign"></i> VENDER
    </button>
    <button onclick="regenerateSoil()" class="bg-orange-700 hover:bg-orange-600 py-5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg">
      <i class="fas fa-sync"></i> REGENERAR SOLO
    </button>
    <button onclick="openShop()" class="bg-purple-700 hover:bg-purple-600 py-5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg">
      <i class="fas fa-store"></i> LOJA
    </button>
  </div>

  <div class="text-center">
    <button onclick="nextDay()" class="bg-amber-900 hover:bg-amber-800 px-12 py-4 rounded-3xl text-xl font-bold shadow-xl">
      ⏭️ AVANÇAR DIA
    </button>
  </div>
</div>

<!-- SHOP MODAL -->
<div id="shopModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
  <div class="bg-gradient-to-b from-amber-950 to-green-950 rounded-3xl p-8 max-w-lg w-full mx-4 border border-amber-700">
    <h2 class="text-4xl font-bold text-center mb-2 text-yellow-300">🛒 Loja do Dia <span id="currentDay" class="text-xl"></span></h2>
    <p class="text-center text-gray-400 mb-6">Sementes disponíveis hoje</p>
    <div id="shopItems" class="grid grid-cols-1 gap-4"></div>
    <button onclick="closeShop()" class="mt-6 w-full bg-red-700 hover:bg-red-600 py-4 rounded-2xl font-bold text-lg">FECHAR LOJA</button>
  </div>
</div>

<script>
// ==================== VARIÁVEIS ====================
let day = 1;
let money = 0;
let totalEarned = 0;
let water = 85;
let soil = 88;
let currentPlant = null;

const allSeeds = [
  { id: 1, name: "Cenoura", emoji: "🥕", price: 30, value: 95, maxStage: 4 },
  { id: 2, name: "Tomate", emoji: "🍅", price: 45, value: 135, maxStage: 5 },
  { id: 3, name: "Morango", emoji: "🍓", price: 65, value: 190, maxStage: 4 },
  { id: 4, name: "Girassol", emoji: "🌻", price: 80, value: 260, maxStage: 6 },
  { id: 5, name: "Batata", emoji: "🥔", price: 40, value: 110, maxStage: 5 },
  { id: 6, name: "Milho", emoji: "🌽", price: 55, value: 160, maxStage: 5 }
];

let availableSeeds = [];

// ==================== INICIALIZAÇÃO ====================
function startGame() {
  refreshShopStock();
  currentPlant = { name: "Cenoura", emoji: "🌱", stage: 1, maxStage: 4, value: 95, waterNeed: 25 };
  updateUI();
}

function refreshShopStock() {
  // Embaralha e pega 3 sementes aleatórias
  availableSeeds = [...allSeeds].sort(() => 0.5 - Math.random()).slice(0, 3);
}

function updateUI() {
  document.getElementById('day').textContent = day;
  document.getElementById('money').textContent = `$ ${money}`;
  document.getElementById('water').textContent = `${Math.floor(water)}%`;
  document.getElementById('soil').textContent = `${Math.floor(soil)}%`;
  document.getElementById('totalEarned').textContent = `$ ${totalEarned}`;

  const plantEl = document.getElementById('plant');
  const waterOverlay = document.getElementById('waterOverlay');

  if (currentPlant) {
    const growth = (currentPlant.stage / currentPlant.maxStage) * 100;
    plantEl.style.fontSize = `${80 + growth * 1.4}px`;
    plantEl.textContent = currentPlant.emoji;
    waterOverlay.style.height = `${water * 2}px`;
  } else {
    plantEl.textContent = '';
    waterOverlay.style.height = '0';
  }
}

// ==================== AÇÕES ====================
function plantSeed() {
  if (currentPlant) return alert("Já tem uma planta no terreno!");
  openShop();
}

function waterPlant() {
  if (!currentPlant) return alert("Não há planta para regar!");
  if (water < 15) return alert("Água insuficiente!");
  water -= 15;
  currentPlant.stage = Math.min(currentPlant.maxStage, currentPlant.stage + 1);
  updateUI();
}

function collectRiverWater() {
  water = Math.min(100, water + 48);
  alert("💧 Você encheu o balde no rio! +48% de água");
  updateUI();
}

function harvest() {
  if (!currentPlant || currentPlant.stage < currentPlant.maxStage) {
    return alert("A planta ainda não está madura!");
  }
  alert(`🌾 Colhido: ${currentPlant.name}!`);
  currentPlant = null;
  updateUI();
}

function sellHarvest() {
  if (currentPlant) return alert("Colha a planta primeiro!");
  const sellValue = Math.floor(Math.random() * 45) + 75;
  money += sellValue;
  totalEarned += sellValue;
  alert(`💰 Vendido por $${sellValue}`);
  updateUI();
}

function regenerateSoil() {
  if (money < 30) return alert("Precisa de $30 para regenerar o solo.");
  money -= 30;
  soil = 100;
  alert("🌱 Solo revitalizado!");
  updateUI();
}

function nextDay() {
  day++;
  refreshShopStock();        // Muda a loja todo dia

  if (currentPlant) {
    water = Math.max(0, water - 20);
    soil = Math.max(20, soil - 10);
    if (water > 30) currentPlant.stage = Math.min(currentPlant.maxStage, currentPlant.stage + 1);
  } else {
    water = Math.min(100, water + 18);
    soil = Math.max(20, soil - 4);
  }

  updateUI();
}

// ==================== LOJA ====================
function openShop() {
  document.getElementById('currentDay').textContent = `(Dia ${day})`;
  const container = document.getElementById('shopItems');
  container.innerHTML = '';

  availableSeeds.forEach(seed => {
    const div = document.createElement('div');
    div.className = "shop-item bg-amber-950 border border-amber-700 rounded-2xl p-5 text-center";
    div.innerHTML = `
      <div class="text-7xl mb-3">${seed.emoji}</div>
      <h3 class="font-bold text-xl">${seed.name}</h3>
      <p class="text-green-400 text-2xl font-bold">$${seed.price}</p>
      <button onclick="buySeed(${seed.id}); event.stopImmediatePropagation()" 
              class="mt-4 w-full bg-emerald-700 hover:bg-emerald-600 py-3 rounded-xl font-bold">
        COMPRAR E PLANTAR
      </button>
    `;
    container.appendChild(div);
  });

  document.getElementById('shopModal').classList.remove('hidden');
}

function buySeed(id) {
  const seed = availableSeeds.find(s => s.id === id);
  if (!seed) return;
  if (money < seed.price) return alert("Dinheiro insuficiente!");

  money -= seed.price;
  currentPlant = {
    name: seed.name,
    emoji: seed.emoji,
    stage: 1,
    maxStage: seed.maxStage,
    value: seed.value,
    waterNeed: 25
  };

  closeShop();
  updateUI();
  alert(`🌱 ${seed.name} plantada com sucesso!`);
}

function closeShop() {
  document.getElementById('shopModal').classList.add('hidden');
}

// Iniciar o jogo
startGame();
</script>
</body>
</html>
