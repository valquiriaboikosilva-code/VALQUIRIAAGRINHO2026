<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌱 Valquíria Farm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.5)), 
                  url('https://images.unsplash.com/photo-1500382017468-88cb43b4c3c7?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover no-repeat fixed;
      background-color: #0f3d0f;
    }
    .plot {
      width: 280px;
      height: 280px;
      background: linear-gradient(#5C4033, #8B5A2B);
      border: 8px solid #4A3F35;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }
    .plant {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 120px;
      transition: all 0.8s ease;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
    }
    .water-level {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(transparent, rgba(59, 130, 246, 0.65));
      transition: height 0.6s ease;
    }
    .stardew-title {
      text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body class="text-white min-h-screen">

<div class="max-w-4xl mx-auto p-6">
  <h1 class="text-5xl font-bold text-center mb-8 text-yellow-300 stardew-title">🌾 VALQUÍRIA FARM 🌾</h1>

  <!-- STATS -->
  <div class="grid grid-cols-5 gap-4 mb-8 text-center">
    <div class="bg-black/50 backdrop-blur rounded-xl p-4 border border-yellow-900">
      <p class="text-sm text-gray-300">Dia</p>
      <p id="day" class="text-4xl font-bold text-amber-300">1</p>
    </div>
    <div class="bg-black/50 backdrop-blur rounded-xl p-4 border border-yellow-900">
      <p class="text-sm text-gray-300">💰 Dinheiro</p>
      <p id="money" class="text-4xl font-bold text-green-400">$ 0</p>
    </div>
    <div class="bg-black/50 backdrop-blur rounded-xl p-4 border border-yellow-900">
      <p class="text-sm text-gray-300">💧 Água</p>
      <p id="water" class="text-4xl font-bold text-blue-400">85%</p>
    </div>
    <div class="bg-black/50 backdrop-blur rounded-xl p-4 border border-yellow-900">
      <p class="text-sm text-gray-300">🌱 Solo</p>
      <p id="soil" class="text-4xl font-bold text-amber-600">88%</p>
    </div>
    <div class="bg-black/50 backdrop-blur rounded-xl p-4 border border-yellow-900">
      <p class="text-sm text-gray-300">Total Ganhos</p>
      <p id="totalEarned" class="text-4xl font-bold text-yellow-400">$ 0</p>
    </div>
  </div>

  <!-- PLOT -->
  <div class="flex justify-center mb-8">
    <div class="plot" id="plot">
      <div id="waterOverlay" class="water-level h-0"></div>
      <div id="plant" class="plant">🌱</div>
    </div>
  </div>

  <!-- CONTROLES -->
  <div class="grid grid-cols-3 md:grid-cols-7 gap-3 mb-8">
    <button onclick="plantSeed()" class="bg-emerald-700 hover:bg-emerald-600 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition">
      <i class="fas fa-seedling"></i> PLANTAR
    </button>
    <button onclick="waterPlant()" class="bg-blue-700 hover:bg-blue-600 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition">
      <i class="fas fa-tint"></i> REGAR
    </button>
    <button onclick="collectRiverWater()" class="bg-cyan-600 hover:bg-cyan-500 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition">
      <i class="fas fa-water"></i> ÁGUA DO RIO
    </button>
    <button onclick="harvest()" class="bg-amber-600 hover:bg-amber-500 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition">
      <i class="fas fa-hand-holding"></i> COLHER
    </button>
    <button onclick="sellHarvest()" class="bg-green-600 hover:bg-green-500 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition">
      <i class="fas fa-dollar-sign"></i> VENDER
    </button>
    <button onclick="regenerateSoil()" class="bg-orange-700 hover:bg-orange-600 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition">
      <i class="fas fa-sync"></i> REGENERAR SOLO
    </button>
    <button onclick="openShop()" class="bg-purple-700 hover:bg-purple-600 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition">
      <i class="fas fa-store"></i> LOJA
    </button>
  </div>

  <div class="text-center">
    <button onclick="nextDay()" class="bg-gray-800 hover:bg-gray-700 px-12 py-4 rounded-2xl text-xl font-bold border border-yellow-700">
      ⏭️ AVANÇAR DIA
    </button>
  </div>
</div>

<!-- SHOP MODAL -->
<div id="shopModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
  <div class="bg-gray-900 rounded-3xl p-8 max-w-lg w-full mx-4 border border-yellow-700">
    <h2 class="text-3xl font-bold text-center mb-2">🛒 Loja do Dia <span id="shopDay" class="text-yellow-400"></span></h2>
    <p class="text-center text-gray-400 mb-6">Estoque rotativo - Novos itens a cada dia!</p>
    <div id="shopItems" class="grid grid-cols-2 gap-4"></div>
    <button onclick="closeShop()" class="mt-6 w-full bg-red-600 hover:bg-red-700 py-3 rounded-2xl font-bold">FECHAR LOJA</button>
  </div>
</div>

<script>
// ==================== VARIÁVEIS ====================
let day = 1;
let money = 0;
let totalEarned = 0;
let water = 85;
let soil = 88;

let currentPlant = null;

const allSeeds = [
  { id: 1, name: "Cenoura", emoji: "🥕", price: 30, value: 85, maxStage: 4 },
  { id: 2, name: "Tomate", emoji: "🍅", price: 45, value: 130, maxStage: 5 },
  { id: 3, name: "Morango", emoji: "🍓", price: 60, value: 180, maxStage: 4 },
  { id: 4, name: "Girassol", emoji: "🌻", price: 80, value: 250, maxStage: 6 },
  { id: 5, name: "Batata", emoji: "🥔", price: 35, value: 95, maxStage: 5 },
  { id: 6, name: "Milho", emoji: "🌽", price: 55, value: 160, maxStage: 5 }
];

// ==================== INICIALIZAÇÃO ====================
function startGame() {
  currentPlant = { name: "Cenoura", emoji: "🌱", stage: 1, maxStage: 4, value: 85 };
  updateUI();
}

function updateUI() {
  document.getElementById('day').textContent = day;
  document.getElementById('money').textContent = `$ ${money}`;
  document.getElementById('water').textContent = `${Math.floor(water)}%`;
  document.getElementById('soil').textContent = `${Math.floor(soil)}%`;
  document.getElementById('totalEarned').textContent = `$ ${totalEarned}`;
  
  const plantEl = document.getElementById('plant');
  const waterOverlay = document.getElementById('waterOverlay');
  
  if (currentPlant) {
    const growth = Math.floor((currentPlant.stage / currentPlant.maxStage) * 100);
    plantEl.style.fontSize = `${70 + growth * 1.3}px`;
    plantEl.textContent = currentPlant.emoji;
    waterOverlay.style.height = `${water * 1.8}px`;
  } else {
    plantEl.textContent = '';
    waterOverlay.style.height = '0';
  }
}

// ==================== LOJA ROTATIVA ====================
function getDailySeeds() {
  const shuffled = [...allSeeds].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, 3); // Mostra 3 sementes diferentes por dia
}

function openShop() {
  const dailySeeds = getDailySeeds();
  const container = document.getElementById('shopItems');
  container.innerHTML = '';
  
  document.getElementById('shopDay').textContent = `(Dia ${day})`;

  dailySeeds.forEach(seed => {
    const div = document.createElement('div');
    div.className = "bg-gray-800 rounded-2xl p-4 text-center hover:scale-105 transition cursor-pointer border border-yellow-700";
    div.innerHTML = `
      <div class="text-6xl mb-3">${seed.emoji}</div>
      <h3 class="font-bold">${seed.name}</h3>
      <p class="text-green-400 font-bold">$${seed.price}</p>
      <button onclick="buySeed(${seed.id}); event.stopImmediatePropagation()" 
              class="mt-4 w-full bg-emerald-600 hover:bg-emerald-700 py-2 rounded-xl text-sm font-bold">
        COMPRAR
      </button>
    `;
    container.appendChild(div);
  });
  
  document.getElementById('shopModal').classList.remove('hidden');
}

function buySeed(id) {
  const seed = allSeeds.find(s => s.id === id);
  if (money < seed.price) {
    alert("💰 Dinheiro insuficiente!");
    return;
  }
  
  money -= seed.price;
  currentPlant = {
    name: seed.name,
    emoji: seed.emoji,
    stage: 1,
    maxStage: seed.maxStage,
    value: seed.value
  };
  
  closeShop();
  updateUI();
  alert(`🌱 ${seed.name} plantada com sucesso!`);
}

function closeShop() {
  document.getElementById('shopModal').classList.add('hidden');
}

// ==================== OUTRAS FUNÇÕES ====================
function plantSeed() {
  if (currentPlant) {
    alert("Já tem uma planta no terreno!");
    return;
  }
  openShop();
}

function waterPlant() {
  if (!currentPlant) return alert("Não há planta para regar!");
  if (water < 15) return alert("Água insuficiente!");
  
  water = Math.max(0, water - 15);
  currentPlant.stage = Math.min(currentPlant.maxStage, currentPlant.stage + 1);
  updateUI();
}

function collectRiverWater() {
  water = Math.min(100, water + 48);
  alert("💧 Você encheu o balde no rio! +48% de água");
  updateUI();
}

function harvest() {
  if (!currentPlant || currentPlant.stage < currentPlant.maxStage) {
    alert("A planta ainda não está madura!");
    return;
  }
  alert(`🌾 Colhido: ${currentPlant.name}!`);
  currentPlant = null;
  updateUI();
}

function sellHarvest() {
  if (currentPlant) return alert("Colha a planta primeiro!");
  const sellValue = Math.floor(Math.random() * 45) + 75;
  money += sellValue;
  totalEarned += sellValue;
  alert(`💰 Vendido por $${sellValue}`);
  updateUI();
}

function regenerateSoil() {
  if (money < 25) return alert("Precisa de $25 para regenerar o solo.");
  money -= 25;
  soil = 100;
  alert("🌱 Solo regenerado!");
  updateUI();
}

function nextDay() {
  day++;
  
  if (currentPlant) {
    water = Math.max(0, water - 18);
    soil = Math.max(20, soil - 10);
    if (water > 30) {
      currentPlant.stage = Math.min(currentPlant.maxStage, currentPlant.stage + 1);
    }
  } else {
    water = Math.min(100, water + 20);
    soil = Math.max(20, soil - 4);
  }
  
  updateUI();
}

// Iniciar o jogo
startGame();
</script>
</body>
</html>
